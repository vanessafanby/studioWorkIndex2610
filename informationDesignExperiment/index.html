<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <title>Information Design Experiment</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />

    <link rel="stylesheet" href="infoDesignReset.css" />
    <link rel="stylesheet" href="infoDesignStyle.css" />
    <link rel="stylesheet" href="keyboardControllerStyle.css" />

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.5/Tone.js"
      integrity="sha512-F1myjNkIKU5XJtOs1HXRo/zOjiUsABgFEEGKLx/riwK82jRThZFebEnfF2HWo9eeC+iC1Nwwnn9Vj6OGq+r7rQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script src="main.js" defer></script>
    <script src="keyboardController.js" defer></script>
  </head>
  <body>
    <dialog id="intro-dialog">
      <p>Hey this page wants to make some noise, is that OK?</p>
      <button id="dialog-close-button" autofocus>That's OK</button>
    </dialog>
<!-- I chose to keep the title centred at the top of the page, this is because I wanted users to immediately see what the page is about and what they will be experiencing on the page. -->

<!-- Furthermore, I moved the three control slider sections onto the right hand slide for them to be more understandable to use. It is also becuase I'm used to used adjustment tools on the right, so I thought that it'll be easier for them too. -->


      <h1>Information Design Experiment</h1>

      <div class="contentRow">
        <div class="keyboardContainer">
          <div class="octaveContainer" data-octave="3">
            <div class="whiteKeyContainer">
              <button class="whiteKey" data-note="c"></button>
              <button class="whiteKey" data-note="d"></button>
              <button class="whiteKey" data-note="e"></button>
              <button class="whiteKey" data-note="f"></button>
              <button class="whiteKey" data-note="g"></button>
              <button class="whiteKey" data-note="a"></button>
              <button class="whiteKey" data-note="b"></button>
            </div>
            <div class="blackKeyContainer">
              <div class="blackKeySpacer"></div>
              <button class="blackKey" data-note="c#"></button>
              <button class="blackKey" data-note="d#"></button>
              <div class="blackKeySpacer"></div>
              <div class="blackKeySpacer"></div>
              <button class="blackKey" data-note="f#"></button>
              <button class="blackKey" data-note="g#"></button>
              <button class="blackKey" data-note="a#"></button>
              <div class="blackKeySpacer"></div>
            </div>
          </div>

          <div class="octaveContainer" data-octave="4">
            <div class="whiteKeyContainer">
              <button class="whiteKey" data-note="c"></button>
              <button class="whiteKey" data-note="d"></button>
              <button class="whiteKey" data-note="e"></button>
              <button class="whiteKey" data-note="f"></button>
              <button class="whiteKey" data-note="g"></button>
              <button class="whiteKey" data-note="a"></button>
              <button class="whiteKey" data-note="b"></button>
            </div>
            <div class="blackKeyContainer">
              <div class="blackKeySpacer"></div>
              <button class="blackKey" data-note="c#"></button>
              <button class="blackKey" data-note="d#"></button>
              <div class="blackKeySpacer"></div>
              <div class="blackKeySpacer"></div>
              <button class="blackKey" data-note="f#"></button>
              <button class="blackKey" data-note="g#"></button>
              <button class="blackKey" data-note="a#"></button>
              <div class="blackKeySpacer"></div>
            </div>
          </div>
        </div>

        <div class="controlsPanel">
          <div class="sliderContainer">
            <div class="iconContainer">
              <span>🔉</span>
              <input
                type="range"
                id="var1Range"
                min="-48"
                max="0"
                step="1"
                value="1"
              />
              <span>🔊</span>
            </div>
            <label for="var1Range">Volume</label>
          </div>
<!-- Here, I've decided to use a low speaker emoji and a high speaker emoji and a symbol for adjustment of volume. The low emoji means quieter and high emoji means louder. I think this is the most understandable emoji to use since we also see this elsewhere in everyday lives.  -->
          <div class="sliderContainer">
            <div class="iconContainer">
              <span>📉</span>
              <input
                type="range"
                id="var2Range"
                min="1"
                max="25"
                step="1"
                value="5"
              />
              <span>📈</span>
            </div>
            <!-- Here, I've included a decreasing and increasing emoji, to symbolise a rise in frequency or a lower frequency. To be honest, I was hesistating to use +1 or -1, however after my experimentation, I wasn't that clear. Therefore I decided to use this emoji, and let the users experiments with each of this sliders.  -->
            <label for="var2Range">Frequency</label>
          </div>

          <div class="sliderContainer">
            <div class="iconContainer">
              <span>𝄢</span>
              <input
                type="range"
                id="var3Range"
                min="1"
                max="100"
                step="1"
                value="1"
              />
              <span>𝄞</span>
            </div>
            <!-- Here, I have actually included symbols of the piano octive shifts, one from the high end, one from the low end. What my aim here is, even if someone who doesn't know how to play the piano, they are able to learn new things whilst experimenting on this webpage.  -->
            <label for="var3Range">Pitch</label>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
